# postits sync — add INSIDE the existing `server { listen 443 ... }` block of
# teklif.conf (it already terminates TLS for teklif.megabilgisayar.com.tr).
# playhtml's client dials  wss://<host>/parties/main/<room>  so this proxies the
# whole /parties/ path to the postits container on 127.0.0.1:8787 with WS upgrade.
#
# Frontend must then set:  VITE_POSTITS_HOST=teklif.megabilgisayar.com.tr
# (playhtml strips the scheme and uses wss:// because the page is https.)

location /parties/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;   # keep long-lived WS connections open
    proxy_send_timeout 3600s;
}
